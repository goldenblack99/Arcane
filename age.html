<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONE Container Age Full Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #1e3a8a; }
    input, button { padding: 12px; margin: 10px; font-size: 16px; }
    button { background: #1e40af; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1e3a8a; }
    #preview { margin-top: 20px; max-height: 65vh; overflow: auto; border: 1px solid #ddd; padding: 10px; background: #fafafa; }
    table { border-collapse: collapse; width: 100%; font-size: 0.9em; }
    th, td { border: 1px solid #999; padding: 6px 8px; text-align: left; }
    th { background: #1e40af; color: white; position: sticky; top: 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>ONE Container Age Report Converter</h1>
  <p>Upload <strong>one rptage.xls</strong> → Size/Type sheets + Cargo Group sheets + Preview</p>
  
  <input type="file" id="fileInput" accept=".xls,.xlsx"><br><br>
  <button onclick="processFile()">Process & Preview</button>
  <button id="downloadBtn" onclick="downloadFile()" style="display:none;">Download one_age_full.xlsx</button>

  <div id="preview"></div>
</div>

<script>
let processedWorkbook = null;

function processFile() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Please select one rptage.xls");

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const wb = XLSX.read(data, { type: 'array' });
    processedWorkbook = XLSX.utils.book_new();

    let currentType = "";
    let allRows = [];

    wb.SheetNames.forEach(sheetName => {
      const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1, defval: "" });

      json.forEach(row => {
        const rowStr = row.join(" ");
        if (rowStr.includes("Size/Type")) {
          const match = rowStr.match(/(20GP|20RF|40FR|40GP|40HC|40HCRF|45HC)/i);
          if (match) currentType = match[0].toUpperCase();
        }

        if (currentType && row[0] && !isNaN(parseInt(row[0])) && row.length > 10) {
          allRows.push(row);
        }
      });
    });

    // === 1. Sheets by Size/Type ===
    const typeGroups = {};
    allRows.forEach(row => {
      const type = currentType || "Other";
      if (!typeGroups[type]) typeGroups[type] = [];
      typeGroups[type].push(row);
    });

    Object.keys(typeGroups).forEach(type => {
      const ws = XLSX.utils.aoa_to_sheet(typeGroups[type]);
      XLSX.utils.book_append_sheet(processedWorkbook, ws, type);
    });

    // === 2. Sheets by Cargo Type ===
    const cargoGroups = { TEA: [], GARMENT: [], FIBER: [], "FROZEN CARGO": [], OTHER: [] };

    allRows.forEach(row => {
      const cargoCell = String(row[16] || row[15] || "").toUpperCase();
      let group = "OTHER";

      if (cargoCell.includes("TEA")) group = "TEA";
      else if (cargoCell.includes("GARMENT")) group = "GARMENT";
      else if (cargoCell.includes("FIBER")) group = "FIBER";
      else if (cargoCell.includes("FROZEN") || cargoCell.includes("SHRIMP") || 
               cargoCell.includes("POTATO") || cargoCell.includes("ONION") || 
               cargoCell.includes("APPLE") || cargoCell.includes("POMEGRANATE")) {
        group = "FROZEN CARGO";
      }

      if (!cargoGroups[group]) cargoGroups[group] = [];
      cargoGroups[group].push(row);
    });

    Object.keys(cargoGroups).forEach(group => {
      if (cargoGroups[group].length > 0) {
        const ws = XLSX.utils.aoa_to_sheet(cargoGroups[group]);
        XLSX.utils.book_append_sheet(processedWorkbook, ws, group);
      }
    });

    // Summary
    const summary = [["Category", "Count"]];
    Object.keys(typeGroups).forEach(t => summary.push([t, typeGroups[t].length]));
    Object.keys(cargoGroups).forEach(g => {
      if (cargoGroups[g].length > 0) summary.push([g + " (Cargo)", cargoGroups[g].length]);
    });
    XLSX.utils.book_append_sheet(processedWorkbook, XLSX.utils.aoa_to_sheet(summary), "Summary");

    renderPreview();
    document.getElementById('downloadBtn').style.display = 'inline-block';
  };
  reader.readAsArrayBuffer(file);
}

function renderPreview() {
  const preview = document.getElementById('preview');
  preview.innerHTML = "<h2>Preview (First Size/Type Sheet)</h2>";

  if (!processedWorkbook?.SheetNames?.length) return;

  const sheetName = processedWorkbook.SheetNames[0];
  const ws = processedWorkbook.Sheets[sheetName];
  preview.innerHTML += `<h3>${sheetName}</h3>`;
  preview.innerHTML += XLSX.utils.sheet_to_html(ws);
}

function downloadFile() {
  if (!processedWorkbook) return;
  XLSX.writeFile(processedWorkbook, "one_age_full.xlsx");
}
</script>
</body>
</html>
