<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ONE Age Full Converter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #1e3a8a; }
    input, button { padding: 12px; margin: 15px; font-size: 17px; }
    button { background: #1e40af; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1e3a8a; }
  </style>
</head>
<body>
<div class="container">
  <h1>ONE Container Age Report Converter</h1>
  <p>Upload <strong>one rptage.xls</strong> → Get exact format like <strong>one age full.xls</strong></p>
  
  <input type="file" id="fileInput" accept=".xls,.xlsx"><br><br>
  <button onclick="convertToFullFormat()">Convert to one_age_full.xlsx</button>
</div>

<script>
async function convertToFullFormat() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) return alert("Please upload the file");

  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
    const newWB = XLSX.utils.book_new();

    let currentType = "";
    let allRows = [];

    wb.SheetNames.forEach(sheet => {
      const json = XLSX.utils.sheet_to_json(wb.Sheets[sheet], {header: 1});

      json.forEach(row => {
        const rowStr = row.join(" ");
        
        if (rowStr.includes("Size/Type")) {
          const match = rowStr.match(/(20GP|20RF|40FR|40GP|40HC|40HCRF|45HC)/i);
          if (match) currentType = match[0].toUpperCase();
        }

        if (currentType && row.length > 8 && row[0] && !isNaN(parseInt(row[0]))) {
          allRows.push([...row]);
        }
      });
    });

    // Main Sheets by Size/Type
    const typeMap = {};
    allRows.forEach(row => {
      const type = currentType || "Data";
      if (!typeMap[type]) typeMap[type] = [];
      typeMap[type].push(row);
    });

    Object.keys(typeMap).forEach(type => {
      const data = typeMap[type];
      const ws = XLSX.utils.aoa_to_sheet(data);
      XLSX.utils.book_append_sheet(newWB, ws, type);
    });

    // Cargo Type Grouping (TEA, GARMENT, FIBER, FROZEN etc.)
    const cargoGroups = {};
    allRows.forEach(row => {
      const lastCargo = String(row[16] || "").toUpperCase().trim();
      let group = "OTHER";

      if (lastCargo.includes("TEA")) group = "TEA";
      else if (lastCargo.includes("GARMENT")) group = "GARMENT";
      else if (lastCargo.includes("FIBER")) group = "FIBER";
      else if (["FROZEN", "SHRIMPS", "POTATOES", "ONION", "APPLES", "POMEGRANATE", "GRAPE"].some(k => lastCargo.includes(k))) 
        group = "FROZEN CARGO";

      if (!cargoGroups[group]) cargoGroups[group] = [];
      cargoGroups[group].push(row);
    });

    Object.keys(cargoGroups).forEach(group => {
      const ws = XLSX.utils.aoa_to_sheet(cargoGroups[group]);
      XLSX.utils.book_append_sheet(newWB, ws, group);
    });

    // Download
    XLSX.writeFile(newWB, "one_age_full.xlsx");
    alert("✅ Conversion completed! File downloaded as one_age_full.xlsx");
  };
  reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
